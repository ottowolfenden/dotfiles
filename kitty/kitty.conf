font_size        11
font_family      Consolas Nerd Font
bold_font        Consolas Nerd Font Bold
italic_font      Consolas Nerd Font Italic
bold_italic_font Consolas Nerd Font Bold Italic

background_opacity            0.85
scrollbar_handle_opacity      0 
scrollbar_track_opacity       0
scrollbar_track_hover_opacity 0

cursor_shape           beam
cursor_shape_unfocused beam
cursor_beam_thickness  1.0
cursor_blink_interval  0.3
cursor_trail           1

map ctrl+backspace send_text all \x17
map ctrl+delete    send_text all \x1bd
map ctrl+left      send_text all \x1bb
map ctrl+right     send_text all \x1bf
map home           send_text all \x01
map end            send_text all \x05
map page_up        send_text all \x01
map page_down      send_text all \x05
map ctrl+z         send_text all \x1f
map ctrl+equal     change_font_size all +2.0
map ctrl+minus     change_font_size all -2.0
map ctrl+0         change_font_size all 0
map ctrl+delete    send_text all \x15

mouse_map right press ungrabbed paste_from_clipboard

touch_scroll_multiplier 10.0
confirm_os_window_close 0
url_style               straight
window_padding_width    10
remember_window_size    no
sync_to_monitor         yes
mouse_hide_wait         0
enable_audio_bell       no